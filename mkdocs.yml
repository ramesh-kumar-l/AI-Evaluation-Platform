site_name: AI Evaluation Platform
site_description: System of record for AI quality — can we safely deploy?
site_url: https://aep.example.com/docs
repo_url: https://github.com/your-org/ai-evaluation-platform

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Deployment: deployment.md
  - Onboarding: NewbieQuickStarterGuide.md
  - Dependencies: dependency-rationale.md
  - Repo Health: REPO_HEALTH_REVIEW.md
  - Missing Artifacts: MISSING_ARTIFACTS_CHECKLIST.md
  - Blog:
    - Why AI Needs CI/CD for Trust: blog/01-ai-systems-need-cicd-for-trust.md
    - Building AEP from First Principles: blog/02-building-ai-eval-platform-from-first-principles.md
    - Engineering Trust for AI Releases: blog/03-engineering-trust-release-assurance-for-ai.md
    - Offline-First AI Infrastructure: blog/04-offline-first-ai-infrastructure.md
    - Architecture Decisions Deep Dive: blog/05-architecture-decisions-production-ai-eval-platform.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
