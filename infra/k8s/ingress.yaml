apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aep-ingress
  namespace: aep
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aep.example.com
      secretName: aep-tls
  rules:
    - host: aep.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aep-api
                port:
                  number: 80
