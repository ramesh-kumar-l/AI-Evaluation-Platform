apiVersion: apps/v1
kind: Deployment
metadata:
  name: aep-api
  namespace: aep
  labels:
    app: aep-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aep-api
  template:
    metadata:
      labels:
        app: aep-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/your-org/aep-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var
              mountPath: /app/var
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var
          emptyDir: {}
